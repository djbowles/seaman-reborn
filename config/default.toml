[llm]
provider = "ollama"
model = "qwen3:8b"
temperature = 0.8
max_tokens = 512
context_window = 4096
max_response_tokens = 256
base_url = "http://localhost:11434"

[memory]
buffer_size = 20
vector_dims = 384
top_k = 5
extraction_interval = 10
db_path = "data/lancedb"
similarity_weight = 0.7
recency_weight = 0.3

[memory.embeddings]
provider = "ollama"
model = "all-minilm:l6-v2"

[personality]
stages_path = "config/stages"

[personality.base_traits]
cynicism = 0.7
wit = 0.8
patience = 0.3
curiosity = 0.6
warmth = 0.2
verbosity = 0.5
formality = 0.2
aggression = 0.4

[creature]
save_path = "data/saves"
initial_stage = "mushroomer"
auto_save = true

[creature.evolution_thresholds]
gillman = { interactions = 20, trust = 0.3 }
podfish = { interactions = 50, trust = 0.5 }
tadman = { interactions = 100, trust = 0.6 }
frogman = { interactions = 200, trust = 0.8 }

[audio]
tts_enabled = true
stt_enabled = false
sfx_enabled = true
tts_provider = "kokoro"
stt_provider = "speech_recognition"
tts_voice = "am_michael"
tts_rate = 150
tts_volume = 0.8
tts_speed = 1.1
sfx_volume = 0.5
ambient_volume = 0.3
audio_output_device = ""
audio_input_device = ""
stt_model = "large-v3-turbo"
stt_silence_threshold = 0.01
stt_silence_duration = 1.5
riva_uri = "localhost:50051"
riva_tts_voice = "English-US.Male-1"
riva_tts_language = "en-US"
riva_asr_language = "en-US"
aec_enabled = false
vad_aggressiveness = 2
aec_filter_length = 2048
aec_step_size = 0.01
barge_in_enabled = false

[environment]
initial_temperature = 24.0
optimal_temp_min = 20.0
optimal_temp_max = 28.0
lethal_temp_min = 10.0
lethal_temp_max = 38.0
cleanliness_decay_rate = 0.01
oxygen_decay_rate = 0.005
initial_environment = "aquarium"

[needs]
hunger_rate = 0.02
comfort_decay_rate = 0.01
health_regen_rate = 0.005
health_damage_rate = 0.01
stimulation_decay_rate = 0.015
critical_hunger_threshold = 0.8
critical_health_threshold = 0.2
starvation_time_hours = 1.0
feeding_cooldown_seconds = 8

[vision]
enabled = false
vision_model = "qwen3-vl:8b"
source = "webcam"
capture_interval = 30.0
max_observations = 3
webcam_index = 0

[gui]
window_width = 1024
window_height = 768
fps = 30
theme = "classic"
show_debug_hud = false
chat_panel_height_ratio = 0.33

[api]
host = "127.0.0.1"
port = 8420
cors_origins = ["http://localhost:3000", "http://127.0.0.1:3000"]
broadcast_interval_ms = 500

[cli]
show_debug = false
stream_responses = true
prompt_style = "seaman"
